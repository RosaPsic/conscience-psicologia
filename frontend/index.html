<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Conscience Psicologia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FAF8F5;--surface:#fff;--surface2:#F4F1EE;--border:#E8E3DD;--border2:#D4CCC4;
  --text:#1A1714;--text2:#6B6560;--text3:#A09890;
  --accent:#6B3F5E;--accent2:#C0748A;--accent-light:#F2E8EF;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --r:10px;--rs:6px;--sh:0 1px 4px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
.sidebar{width:230px;background:var(--accent);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.12);}
.sb-logo h1{font-family:"DM Serif Display",serif;font-size:16px;color:#fff;line-height:1.3;margin-bottom:2px;}
.sb-logo p{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:.04em;}
.sb-nav{padding:10px 0;flex:1;}
.nav-group{padding:8px 16px 4px;font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.13);color:#fff;border-left-color:#fff;}
.nav-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--accent2);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.1);}
.sb-footer p{font-size:10px;color:rgba(255,255,255,0.4);line-height:1.6;}
.main{flex:1;overflow-y:auto;}
.topbar{padding:20px 26px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.topbar h2{font-family:"DM Serif Display",serif;font-size:22px;color:var(--text);}
.content{padding:0 26px 40px;}
.section{display:none;}
.section.active{display:block;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s;font-family:"DM Sans",sans-serif;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{opacity:.87;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:21px;font-weight:500;line-height:1;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px;}
.card-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-title{font-size:13px;font-weight:500;color:var(--text);}
.alert{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:10px;font-size:13px;color:var(--text2);}
.alert.info{border-left:3px solid var(--blue);background:var(--blue-bg);}
.loading{text-align:center;padding:20px;color:var(--text3);}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border2);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <h1>Conscience Psicologia</h1>
    <p>Rosa Almeida - CRP 03/11768</p>
  </div>
  <nav class="sb-nav">
    <div class="nav-group">Geral</div>
    <div class="nav-item active" data-aba="dashboard" onclick="ir('dashboard')"><span class="nav-icon">📊</span> Painel</div>
    <div class="nav-item" data-aba="pacientes" onclick="ir('pacientes')"><span class="nav-icon">👥</span> Pacientes</div>
  </nav>
  <div class="sb-footer">
    <p>(71) 99231-0234<br>rosa.psic@hotmail.com<br>Conscience Psicologia Ltda</p>
  </div>
</aside>

<main class="main">
  <!-- DASHBOARD -->
  <div id="sec-dashboard" class="section active">
    <div class="topbar"><h2>Painel geral</h2></div>
    <div class="content">
      <div class="stats" id="stats"></div>
      <div class="alert info">
        <span>ℹ️</span>
        <span>Backend conectado em <strong>http://localhost:5000</strong></span>
      </div>
    </div>
  </div>

  <!-- PACIENTES -->
  <div id="sec-pacientes" class="section">
    <div class="topbar"><h2>Pacientes</h2></div>
    <div class="content" id="pacientes-content"></div>
  </div>
</main>

<script>
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:5000/api'
  : `${window.location.origin}/api`;

// ═══════════════════════════════════════════════════════════════
// REQUISIÇÕES API
// ═══════════════════════════════════════════════════════════════

async function fetch_api(endpoint, options = {}) {
  try {
    const response = await fetch(`${API_URL}${endpoint}`, {
      headers: {'Content-Type': 'application/json'},
      ...options
    });
    const data = await response.json();
    if (!response.ok) {
      console.error(`Erro ${response.status}:`, data);
      return null;
    }
    return data;
  } catch (error) {
    console.error(`Erro na requisição ${endpoint}:`, error);
    return null;
  }
}

async function carregarStats() {
  const result = await fetch_api('/stats');
  if (!result) {
    document.getElementById('stats').innerHTML = '<div class="alert info">Erro ao carregar estatísticas</div>';
    return;
  }

  const { total_pacientes, total_sessoes, total_recebido, total_pendente, nfs_pendentes } = result.data;

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Pacientes</div>
      <div class="stat-val">${total_pacientes}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Sessões</div>
      <div class="stat-val">${total_sessoes}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Recebido</div>
      <div class="stat-val" style="color:var(--green)">R$ ${total_recebido?.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
    </div>
    <div class="stat">
      <div class="stat-label">A Receber</div>
      <div class="stat-val" style="color:var(--amber)">R$ ${total_pendente?.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
    </div>
    <div class="stat">
      <div class="stat-label">NF Pendentes</div>
      <div class="stat-val" style="color:var(--red)">${nfs_pendentes}</div>
    </div>
  `;
}

async function carregarPacientes() {
  document.getElementById('pacientes-content').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  const result = await fetch_api('/pacientes');
  if (!result) {
    document.getElementById('pacientes-content').innerHTML = '<div class="alert info">Erro ao carregar pacientes</div>';
    return;
  }

  const pacientes = result.data;

  if (pacientes.length === 0) {
    document.getElementById('pacientes-content').innerHTML = '<div class="alert info">Nenhum paciente cadastrado</div>';
    return;
  }

  let html = '<div class="card"><div class="card-header"><span class="card-title">Pacientes Cadastrados</span></div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html += '<thead><tr style="background:var(--surface2);"><th style="padding:10px;text-align:left;">Nome</th><th style="padding:10px;text-align:left;">Email</th><th style="padding:10px;text-align:left;">Telefone</th></tr></thead>';
  html += '<tbody>';

  pacientes.forEach(p => {
    html += `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:10px;"><b>${p.nome}</b></td>
      <td style="padding:10px;">${p.email || '--'}</td>
      <td style="padding:10px;">${p.telefone || '--'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('pacientes-content').innerHTML = html;
}

function ir(aba) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const sec = document.getElementById(`sec-${aba}`);
  if (sec) sec.classList.add('active');

  const navEl = document.querySelector(`.nav-item[data-aba="${aba}"]`);
  if (navEl) navEl.classList.add('active');

  if (aba === 'dashboard') carregarStats();
  if (aba === 'pacientes') carregarPacientes();
}

// ═══════════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════

window.addEventListener('load', () => {
  console.log('🚀 Aplicação iniciada');
  carregarStats();
});
</script>
</body>
</html>
